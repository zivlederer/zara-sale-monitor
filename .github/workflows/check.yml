name: Check Zara Israel Sale

on:
  # Daily at 07:00 UTC = 09:00 Israel time (UTC+2 / UTC+3 DST)
  schedule:
    - cron: "0 7 * * *"

  # Manual trigger — click "Run workflow" in Actions tab for instant check
  workflow_dispatch:

# Allow writing back status.json to the repo
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sale checker
        run: python check.py
        env:
          WHATSAPP_PHONE:  ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}

      - name: Commit & push status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          # Only commit if something changed
          git diff --cached --quiet && echo "No change in status.json, skipping commit." || \
            git commit -m "chore: update sale status [skip ci]" && git push
